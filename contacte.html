<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projecte BCN Responsive - Contacte</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header-principal">
        <div class="logo">
            <h2>BCN</h2>
        </div>
        <nav class="nav-menu">
            <ul>
                <li><a href="index.html">Inici</a></li>
                <li><a href="galeria.html">Galeria</a></li>
                <li><a href="contacte.html">Contacte</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="seccio-contacte">
            <h1>Formulari de Contacte</h1>
            <div class="formulari-container">
                <form action="#" method="POST" class="formulari-contacte">
                    <div class="grup-formulari">
                        <label for="nom">Nom:</label>
                        <input type="text" id="nom" name="nom" required placeholder="El teu nom complet">
                    </div>
                    <div class="grup-formulari">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required placeholder="El teu correu electrònic">
                    </div>
                    <div class="grup-formulari">
                        <label for="missatge">Missatge:</label>
                        <textarea id="missatge" name="missatge" rows="5" required placeholder="Escriu aquí el teu missatge..."></textarea>
                    </div>
                    <button type="submit" class="boto-enviar">Enviar</button>
                </form>
            </div>
        </section>
    </main>
    <footer class="footer-principal">
        <p>Projecte M04 - Disseny d'Aplicacions Multiplataforma</p>
        <p>© 2025</p>
    </footer>
</body>
</html>
